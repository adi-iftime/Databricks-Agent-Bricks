name: Databricks CI/CD

on:
  pull_request:
    branches: [main, master, dev]
  push:
    branches: [main, master, dev]
  workflow_dispatch:

concurrency:
  group: databricks-cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check (hook modules)
        run: ruff check .cursor/hooks

  unit-test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p "test_*.py" -v

  databricks-auth:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@v0.267.0

      - name: Verify Databricks authentication
        run: databricks current-user me

  bundle-validate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle manifest structure check
        run: python3 -m unittest tests.test_databricks_bundle -v

      - name: Databricks bundle validate (requires auth)
        run: |
          echo "Live 'databricks bundle validate' enabled in SCRUM-122 after auth merge."
          echo "Auth uses repository secrets DATABRICKS_HOST and DATABRICKS_TOKEN (SCRUM-121)."

  deploy:
    needs: [lint, unit-test, databricks-auth, bundle-validate]
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploy gated until SCRUM-122 validate gate and deploy stories."
