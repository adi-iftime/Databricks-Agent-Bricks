resources:
  jobs:
    agent_analysis:
      name: "[${bundle.target}] mlops agent analysis"
      tasks:
        - task_key: stub
          notebook_task:
            notebook_path: ../../notebooks/agent/stub
          job_cluster_key: mlops_shared

      job_clusters:
        - job_cluster_key: mlops_shared
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            custom_tags:
              ResourceClass: SingleNode
              project: mlops_intelligence
              component: agent
