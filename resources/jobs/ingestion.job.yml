resources:
  jobs:
    ingestion:
      name: "[${bundle.target}] mlops ingestion"
      tags:
        project: mlops_intelligence
        component: ingestion
      tasks:
        - task_key: stub
          notebook_task:
            notebook_path: ../../notebooks/ingestion/stub
          job_cluster_key: mlops_shared

      job_clusters:
        - job_cluster_key: mlops_shared
          new_cluster:
            policy_id: ${var.cluster_policy_id}
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode
