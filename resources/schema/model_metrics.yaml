table: model_metrics
catalog: mlops_intelligence_dev
schema: bronze_ops
format: delta
partitioned_by:
  - event_ts_date
columns:
  - name: model_name
    type: string
    nullable: false
  - name: model_version
    type: string
    nullable: false
  - name: metric_name
    type: string
    nullable: false
  - name: metric_value
    type: double
    nullable: false
  - name: event_ts
    type: timestamp
    nullable: false
  - name: ingested_at
    type: timestamp
    nullable: false
