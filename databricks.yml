# ML Operations Intelligence — Databricks Asset Bundle
# Jobs: SCRUM-127 | UC SQL: SCRUM-130+

bundle:
  name: mlops_intelligence

include:
  - resources/*.yml
  - resources/jobs/*.yml

sync:
  paths:
    - src
    - notebooks
    - resources

variables:
  catalog:
    description: Unity Catalog name for ML ops intelligence
    default: mlops_intelligence
  schema:
    description: Default schema for platform tables
    default: ops
  workspace_root:
    description: Workspace path prefix for bundle deployments
    default: /Workspace/Users/${workspace.current_user}/.bundle/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: dev
    variables:
      catalog: mlops_intelligence_dev
      schema: ops

  staging:
    mode: production
    workspace:
      profile: staging
    variables:
      catalog: mlops_intelligence_staging
      schema: ops

  prod:
    mode: production
    workspace:
      profile: prod
    variables:
      catalog: mlops_intelligence_prod
      schema: ops
