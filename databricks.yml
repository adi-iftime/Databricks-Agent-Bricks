# ML Operations Intelligence — Databricks Asset Bundle
# Jobs: SCRUM-127 | UC SQL: SCRUM-130+

bundle:
  name: mlops_intelligence

include:
  - resources/*.yml
  - resources/jobs/*.yml

sync:
  paths:
    - src
    - notebooks
    - resources

variables:
  catalog:
    default: mlops_intelligence
  schema:
    default: ops
  workspace_root:
    default: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  cluster_policy_id:
    default: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: dev
    variables:
      catalog: mlops_intelligence_dev
      schema: ops
